<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0A0A18" />
  <title>LF Services — Guest Portal</title>
  <style>
    :root {
      --bg:         #0A0A18;
      --bg-card:    #111127;
      --bg-card2:   #1A1A35;
      --gold:       #F0C040;
      --gold-dim:   #A07A1A;
      --purple:     #7B3CE8;
      --purple-dim: #4C1D95;
      --text:       #E8E8F0;
      --text-dim:   #8888A8;
      --border:     #252540;
      --success:    #34D399;
      --danger:     #F87171;
      --radius:     16px;
      --radius-sm:  10px;
      --font:       system-ui, -apple-system, 'Segoe UI', sans-serif;
      --transition: 0.22s ease;
      --shadow:     0 2px 16px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

    /* ── LANGUAGE SCREEN ──────────────────── */
    .lang-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: linear-gradient(160deg, #140830 0%, #0D0A22 55%, #0A0A18 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 28px; gap: 32px;
    }
    .lang-screen.hidden { display: none; }
    .lang-screen-logo {
      font-size: 2rem; font-weight: 800; color: var(--gold); letter-spacing: 0.02em;
    }
    .lang-screen-unit {
      font-size: 0.85rem; color: var(--text-dim); margin-top: -24px; text-align: center;
    }
    .lang-screen-prompt {
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-dim);
    }
    .lang-options { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; }
    .lang-option-btn {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text); font-size: 1rem; font-weight: 600;
      transition: border-color var(--transition), box-shadow var(--transition);
      box-shadow: var(--shadow);
    }
    .lang-option-btn:active { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }
    .lang-flag { font-size: 1.8rem; line-height: 1; }
    .lang-name { flex: 1; }
    .lang-arrow { color: var(--text-dim); font-size: 1rem; }

    /* ── APP WRAPPER ──────────────────────── */
    .app { width: 100%; max-width: 480px; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── HEADER ───────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,24,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .logo { font-size: 1.05rem; font-weight: 700; color: var(--gold); letter-spacing: 0.02em; }
    .lang-switcher { display: flex; gap: 4px; }
    .lang-btn {
      padding: 5px 10px; border-radius: var(--radius-sm);
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
      color: var(--text-dim); transition: var(--transition);
    }
    .lang-btn.active { background: var(--gold); color: #0A0A18; }

    /* ── HERO ─────────────────────────────── */
    .hero {
      padding: 28px 20px 24px;
      background: linear-gradient(160deg, #180A38 0%, #0F0C28 55%, var(--bg) 100%);
      border-bottom: 1px solid var(--border); position: relative;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 85% 0%, rgba(123,60,232,0.14) 0%, transparent 65%);
      pointer-events: none;
    }
    .hero-label {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.18em;
      color: var(--purple); text-transform: uppercase; margin-bottom: 4px;
    }
    .hero-name { font-size: 1.75rem; font-weight: 800; color: var(--text); line-height: 1.1; }
    .hero-location { font-size: 0.82rem; color: var(--text-dim); margin-top: 5px; }
    .hero-times { display: flex; gap: 12px; margin-top: 20px; }
    .hero-time-card {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(240,192,64,0.18);
      border-radius: var(--radius-sm); padding: 14px 16px;
    }
    .hero-time-label {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--gold-dim);
    }
    .hero-time-value {
      font-size: 1.65rem; font-weight: 900; color: var(--gold);
      line-height: 1.2; margin-top: 2px; letter-spacing: 0.02em;
    }

    /* ── TRANSFER BANNER ──────────────────── */
    .transfer-banner {
      margin: 14px 16px 0;
      background: linear-gradient(135deg, #160D40 0%, #221060 100%);
      border: 1px solid rgba(123,60,232,0.45);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(123,60,232,0.2);
    }
    .transfer-banner-btn {
      width: 100%; padding: 14px 16px 12px; text-align: left;
    }
    .transfer-banner-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .transfer-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(240,192,64,0.15);
      border: 1px solid rgba(240,192,64,0.4);
      border-radius: 999px; padding: 4px 12px;
      font-size: 0.62rem; font-weight: 800; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--gold);
    }
    .transfer-chevron {
      font-size: 0.72rem; color: var(--text-dim);
      transition: transform var(--transition);
    }
    .transfer-banner.open .transfer-chevron { transform: rotate(180deg); }
    .transfer-headline {
      font-size: 0.98rem; font-weight: 700; color: var(--text); line-height: 1.3;
    }
    .transfer-banner-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    .transfer-banner.open .transfer-banner-body { max-height: 800px; }
    .transfer-banner-inner { padding: 0 16px 16px; }
    .transfer-banner-text { font-size: 0.88rem; color: var(--text-dim); line-height: 1.6; }
    .transfer-photo-grid { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .transfer-photo-item {
      border-radius: var(--radius-sm); overflow: hidden;
      aspect-ratio: 16/9; background: var(--bg-card2); cursor: pointer; position: relative;
    }
    .transfer-photo-item img { width: 100%; height: 100%; object-fit: cover; }

    /* ── TABS ─────────────────────────────── */
    .tabs {
      display: flex; padding: 0 20px; gap: 4px;
      margin-top: 12px; border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1; padding: 12px 8px; font-size: 0.85rem; font-weight: 600;
      color: var(--text-dim); border-bottom: 2px solid transparent;
      transition: var(--transition); text-align: center;
    }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-content { display: none; flex: 1; flex-direction: column; }
    .tab-content.active { display: flex; }

    /* ── SECTION GROUPS ───────────────────── */
    .section-group {
      display: flex; align-items: center; gap: 10px;
      padding: 20px 20px 8px;
    }
    .section-group-label {
      font-size: 0.62rem; font-weight: 800; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--text-dim); white-space: nowrap;
    }
    .section-group-line { flex: 1; height: 1px; background: var(--border); }

    /* ── ACCORDION ────────────────────────── */
    .accordion { padding: 0 16px 4px; display: flex; flex-direction: column; gap: 8px; }
    .acc-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .acc-item.open { border-color: rgba(240,192,64,0.3); box-shadow: 0 6px 28px rgba(0,0,0,0.45); }
    .acc-header {
      width: 100%; display: flex; align-items: center; gap: 12px;
      padding: 16px; text-align: left; transition: background var(--transition);
    }
    .acc-header:active { background: var(--bg-card2); }
    .acc-icon {
      font-size: 1.2rem; flex-shrink: 0; width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(240,192,64,0.07); border-radius: 10px;
    }
    .acc-title { font-size: 0.93rem; font-weight: 600; color: var(--text); flex: 1; }
    .acc-chevron {
      font-size: 0.72rem; color: var(--text-dim);
      transition: transform var(--transition); flex-shrink: 0;
    }
    .acc-item.open .acc-chevron { transform: rotate(180deg); color: var(--gold); }
    .acc-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    .acc-item.open .acc-body { max-height: 2400px; }
    .acc-inner { padding: 0 16px 16px; font-size: 0.88rem; color: var(--text-dim); line-height: 1.65; }

    /* ── WIFI ─────────────────────────────── */
    .wifi-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-card2); border-radius: var(--radius-sm);
      padding: 12px 14px; margin-top: 8px;
    }
    .wifi-label { font-size: 0.68rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }
    .wifi-value { font-size: 1rem; font-weight: 700; color: var(--text); margin-top: 2px; }
    .copy-btn {
      background: var(--gold); color: #0A0A18;
      font-size: 0.75rem; font-weight: 700; padding: 8px 14px;
      border-radius: var(--radius-sm); min-width: 78px; text-align: center;
      transition: opacity var(--transition);
    }
    .copy-btn:active { opacity: 0.7; }
    .copy-btn.copied { background: var(--success); }
    .wifi-qr-btn {
      width: 100%; margin-top: 10px; padding: 12px 16px;
      background: rgba(123,60,232,0.1);
      border: 1px dashed rgba(123,60,232,0.4);
      border-radius: var(--radius-sm); color: #A78BFA;
      font-size: 0.85rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background var(--transition);
    }
    .wifi-qr-btn:active { background: rgba(123,60,232,0.2); }

    /* ── MODAL (WiFi QR) ──────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; padding: 32px;
    }
    .modal-overlay.hidden { display: none; }
    .modal-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px 24px;
      width: 100%; max-width: 300px; text-align: center; position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .modal-close {
      position: absolute; top: 12px; right: 14px;
      font-size: 1.15rem; color: var(--text-dim); padding: 4px 8px;
    }
    .modal-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .modal-sub { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 20px; }
    .modal-qr-wrap {
      background: #fff; border-radius: var(--radius-sm);
      padding: 12px; display: inline-block;
    }
    .modal-qr-wrap img { display: block; width: 180px; height: 180px; }
    .modal-hint { font-size: 0.72rem; color: var(--text-dim); margin-top: 16px; line-height: 1.5; }

    /* ── ACTION BUTTONS ───────────────────── */
    .action-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .action-btn {
      flex: 1; min-width: 120px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 12px 14px; border-radius: var(--radius-sm);
      font-size: 0.85rem; font-weight: 600;
      transition: opacity var(--transition); min-height: 44px;
    }
    .action-btn:active { opacity: 0.7; }
    .btn-maps { background: var(--purple); color: #fff; }
    .btn-call { background: var(--success); color: #0A0A18; }
    .btn-whatsapp { background: #25D366; color: #fff; }

    /* ── INFO ROWS ────────────────────────── */
    .info-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 10px 0; border-bottom: 1px solid var(--border); gap: 12px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key {
      font-size: 0.72rem; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.1em; flex-shrink: 0;
    }
    .info-val { font-size: 0.9rem; font-weight: 600; color: var(--text); text-align: right; }

    /* ── LOCK CODE ────────────────────────── */
    .lockcode-box {
      background: var(--bg-card2); border: 1px solid rgba(240,192,64,0.3);
      border-radius: var(--radius-sm); padding: 16px; margin-top: 10px;
    }
    .lockcode-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold-dim); }
    .lockcode-value { font-size: 2.2rem; font-weight: 900; color: var(--gold); letter-spacing: 0.35em; margin-top: 4px; }

    /* ── RULES LIST ───────────────────────── */
    .rules-list { list-style: none; margin-top: 8px; }
    .rules-list li {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid var(--border);
      font-size: 0.88rem; color: var(--text); line-height: 1.45;
    }
    .rules-list li:last-child { border-bottom: none; }
    .rule-icon { flex-shrink: 0; margin-top: 1px; }

    /* ── CHECKLIST ────────────────────────── */
    .checklist { list-style: none; margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
    .checklist-item {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--bg-card2); border-radius: var(--radius-sm); padding: 12px 14px;
    }
    .checklist-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }
    .checklist-text { font-size: 0.88rem; color: var(--text); line-height: 1.4; }
    .checklist-sub { font-size: 0.76rem; color: var(--text-dim); margin-top: 2px; }

    /* ── PHOTO GRID ───────────────────────── */
    .photo-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-top: 12px; }
    .photo-item {
      aspect-ratio: 4/3; border-radius: var(--radius-sm);
      background: var(--bg-card2); overflow: hidden; position: relative; cursor: pointer;
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .photo-item:active img { transform: scale(0.97); }
    .photo-zoom-hint {
      position: absolute; bottom: 5px; right: 5px;
      background: rgba(0,0,0,0.65); border-radius: 4px;
      font-size: 0.6rem; padding: 2px 6px; color: rgba(255,255,255,0.8);
    }
    .photo-placeholder {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; color: var(--text-dim); font-size: 0.68rem; text-align: center; padding: 8px;
    }
    .photo-placeholder-icon { font-size: 1.5rem; }

    /* ── LIGHTBOX ─────────────────────────── */
    .lightbox {
      position: fixed; inset: 0; z-index: 700;
      background: rgba(0,0,0,0.97);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .lightbox.hidden { display: none; }
    .lightbox-close {
      position: absolute; top: 14px; right: 16px;
      font-size: 1.6rem; color: rgba(255,255,255,0.7); padding: 8px; z-index: 10; line-height: 1;
    }
    .lightbox-img-wrap {
      width: 100%; max-height: 82vh;
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .lightbox-img { max-width: 100%; max-height: 82vh; border-radius: 10px; object-fit: contain; }
    .lightbox-nav {
      display: flex; align-items: center; gap: 24px; margin-top: 16px; padding: 0 16px;
    }
    .lightbox-nav-btn { font-size: 1.8rem; color: rgba(255,255,255,0.6); padding: 8px 14px; }
    .lightbox-nav-btn:disabled { opacity: 0.15; }
    .lightbox-counter { font-size: 0.8rem; color: rgba(255,255,255,0.4); min-width: 56px; text-align: center; }

    /* ── EMERGENCY CONTACTS ───────────────── */
    .contact-card { background: var(--bg-card2); border-radius: var(--radius-sm); padding: 14px; margin-top: 8px; }
    .contact-name { font-size: 1rem; font-weight: 700; color: var(--text); }
    .contact-role { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }

    /* ── RECOMMENDATIONS ──────────────────── */
    .rec-card { background: var(--bg-card2); border-radius: var(--radius-sm); padding: 12px 14px; margin-top: 8px; }
    .rec-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .rec-name { font-weight: 700; color: var(--text); font-size: 0.95rem; }
    .rec-type {
      font-size: 0.65rem; font-weight: 700; color: var(--purple);
      background: rgba(123,60,232,0.15); padding: 3px 9px;
      border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
    }
    .rec-tip { font-size: 0.84rem; color: var(--text-dim); margin-top: 6px; }

    /* ── CHAT ─────────────────────────────── */
    #tab-chat { flex: 1; display: none; flex-direction: column; height: calc(100vh - 230px); }
    #tab-chat.active { display: flex; }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .chat-msg {
      max-width: 86%; padding: 10px 14px; border-radius: 16px;
      font-size: 0.88rem; line-height: 1.55; word-break: break-word;
    }
    .chat-msg.bot {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px;
    }
    .chat-msg.user {
      background: var(--purple); color: #fff;
      align-self: flex-end; border-bottom-right-radius: 4px;
    }
    /* Markdown in chat */
    .chat-msg strong { font-weight: 700; }
    .chat-msg.bot strong { color: var(--gold); }
    .chat-msg.user strong { color: #fff; }
    .chat-msg p { margin-bottom: 5px; }
    .chat-msg p:last-child { margin-bottom: 0; }
    .chat-msg ul { margin: 5px 0 5px 16px; }
    .chat-msg li { margin-bottom: 3px; }
    .chat-typing {
      display: flex; align-items: center; gap: 4px; padding: 10px 14px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; border-bottom-left-radius: 4px; align-self: flex-start;
    }
    .dot { width: 7px; height: 7px; background: var(--text-dim); border-radius: 50%; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
    .chat-input-wrap {
      padding: 12px 16px; background: var(--bg);
      border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end;
    }
    .chat-input {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 22px; padding: 10px 16px; color: var(--text);
      font: inherit; font-size: 0.88rem; outline: none; resize: none;
      max-height: 100px; line-height: 1.4;
    }
    .chat-input::placeholder { color: var(--text-dim); }
    .chat-input:focus { border-color: var(--purple); }
    .chat-send {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--gold); color: #0A0A18; font-size: 1.05rem; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity var(--transition);
    }
    .chat-send:active { opacity: 0.7; }
    .chat-notice { font-size: 0.7rem; color: var(--text-dim); text-align: center; padding: 4px 20px 0; }

    /* ── WORKER NOTICE ────────────────────── */
    .worker-notice {
      background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25);
      border-radius: var(--radius-sm); padding: 8px 12px; margin: 8px 20px 0;
      font-size: 0.74rem; color: var(--danger); text-align: center;
    }

    /* ── FALLBACK ─────────────────────────── */
    .fallback {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 32px; text-align: center; gap: 16px;
    }
    .fallback-icon { font-size: 3rem; }
    .fallback-title { font-size: 1.3rem; font-weight: 800; color: var(--text); }
    .fallback-text { font-size: 0.9rem; color: var(--text-dim); line-height: 1.6; }

    /* ── SCROLLBAR ────────────────────────── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── BOTTOM PADDING ───────────────────── */
    .accordion:last-child { padding-bottom: 28px; }

    /* ── ADMIN ───────────────────────────── */
    .admin-badge {
      font-size: 0.62rem; font-weight: 800; letter-spacing: 0.14em;
      text-transform: uppercase; background: var(--danger); color: #fff;

/* ═══════════════════════════════════════════════════════
   ESTADO
   ═══════════════════════════════════════════════════════ */
let currentLang = 'pt';
let currentUnit = null;
let chatHistory = [];
let activeAccordion = null;
let activeTab = 'info';
let lightboxUrls = [];
let lightboxIdx = 0;

/* ═══════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════ */
function init() {
  const params = new URLSearchParams(window.location.search);

  // Modo admin — ?admin=KEY
  const adminKey = params.get('admin');
  if (adminKey) {
    // Remove a key da URL imediatamente (segurança básica)
    const cleanParams = new URLSearchParams(params);
    cleanParams.delete('admin');
    const cleanSearch = cleanParams.toString() ? '?' + cleanParams.toString() : '';
    history.replaceState({}, '', window.location.pathname + cleanSearch);
    document.getElementById('lang-screen').classList.add('hidden');
    renderAdminLoading();
    fetchAdminStats(adminKey);
    return;
  }

  const unitId = params.get('unit');
  currentUnit = unitId ? UNITS[Number(unitId)] : null;

  if (!currentUnit) {
    // Sem unidade válida: esconde tela de idioma e mostra fallback
    document.getElementById('lang-screen').classList.add('hidden');
    render();
    return;
  }

  // Atualiza subtítulo da tela de idioma
  const unitEl = document.getElementById('lang-screen-unit');
  if (unitEl) unitEl.textContent = currentUnit.name + ' · ' + currentUnit.location;

  // Verifica idioma salvo
  const saved = localStorage.getItem('lf_lang_' + unitId);
  if (saved && ['pt','en','es'].includes(saved)) {
    currentLang = saved;
    document.getElementById('lang-screen').classList.add('hidden');
    render();
  }
  // Caso contrário, a tela de idioma já está visível
}

function selectLang(lang) {
  const params = new URLSearchParams(window.location.search);
  const unitId = params.get('unit');
  currentLang = lang;
  if (unitId) localStorage.setItem('lf_lang_' + unitId, lang);
  document.getElementById('lang-screen').classList.add('hidden');
  render();
}

/* ═══════════════════════════════════════════════════════
   RENDER PRINCIPAL
   ═══════════════════════════════════════════════════════ */
function render() {
  const app = document.getElementById('app');
  const t = i18n[currentLang];

  if (!currentUnit) {
    app.innerHTML = renderFallback(t);
    attachLangListeners();
    return;
  }

  const u = currentUnit;

  app.innerHTML = `
    ${renderHeader(t)}
    ${renderHero(t)}
    ${u.transfer ? renderTransferBanner(t) : ''}
    ${renderTabs(t)}

    <div class="tab-content ${activeTab === 'info' ? 'active' : ''}" id="tab-info">

      ${sectionGroup(t.section_arrival)}
      <div class="accordion">
        ${renderWifi(t)}
        ${renderCheckin(t)}
        ${renderCheckinSteps(t)}
        ${renderParking(t)}
      </div>

      ${sectionGroup(t.section_during)}
      <div class="accordion">
        ${renderRules(t)}
        ${renderAppliances(t)}
        ${renderPool(t)}
        ${u.gym ? renderGym(t) : ''}
        ${u.laundry ? renderLaundry(t) : ''}
        ${u.condoMap ? renderCondoMap(t) : ''}
      </div>

      ${sectionGroup(t.section_departure)}
      <div class="accordion">
        ${renderCheckoutSteps(t)}
        ${renderTrash(t)}
      </div>

      ${sectionGroup(t.section_more)}
      <div class="accordion">
        ${renderRecommendations(t)}
        ${renderEmergency(t)}
      </div>

    </div>

    <div class="tab-content ${activeTab === 'chat' ? 'active' : ''}" id="tab-chat">
      ${WORKER_URL.includes('[SEU-WORKER]') ? `<div class="worker-notice">${t.chat_worker_notice}</div>` : ''}
      <div class="chat-messages" id="chat-messages"></div>
      <p class="chat-notice">${t.chat_notice}</p>
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chat-input" rows="1"
          placeholder="${t.chat_placeholder}"
          onkeydown="handleChatKey(event)"></textarea>
        <button class="chat-send" onclick="sendMessage()" aria-label="Enviar">➤</button>
      </div>
    </div>
  `;

  attachAccordionListeners();
  attachTabListeners(t);
  attachLangListeners();

  if (activeTab === 'chat') renderChatMessages(t);
}

/* ═══════════════════════════════════════════════════════
   LIGHTBOX
   ═══════════════════════════════════════════════════════ */
function openLightbox(urls, idx) {
  lightboxUrls = Array.isArray(urls) ? urls : [urls];
  lightboxIdx = idx || 0;
  updateLightbox();
  document.getElementById('lightbox').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.add('hidden');
  document.body.style.overflow = '';
}

function closeLightboxBg(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

function lightboxNav(dir) {
  lightboxIdx = Math.max(0, Math.min(lightboxUrls.length - 1, lightboxIdx + dir));
  updateLightbox();
}

function updateLightbox() {
  document.getElementById('lightbox-img').src = lightboxUrls[lightboxIdx];
  document.getElementById('lb-counter').textContent = lightboxUrls.length > 1
    ? `${lightboxIdx + 1} / ${lightboxUrls.length}` : '';
  document.getElementById('lb-prev').disabled = lightboxIdx === 0;
  document.getElementById('lb-next').disabled = lightboxIdx === lightboxUrls.length - 1;
  document.getElementById('lightbox-nav').style.display = lightboxUrls.length <= 1 ? 'none' : 'flex';
}

   ═══════════════════════════════════════════════════════ */
function openWifiQR() {
  const t = i18n[currentLang];
  const u = currentUnit;
  const data = `WIFI:T:WPA;S:${u.wifi.ssid};P:${u.wifi.password};;`;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data)}`;
  document.getElementById('wifi-qr-img').src = qrUrl;
  document.getElementById('wifi-modal-title').textContent = u.wifi.ssid;
  document.getElementById('wifi-modal-sub').textContent = t.wifi_qr_sub;
  document.getElementById('wifi-modal-hint').textContent = t.wifi_qr_hint;
  document.getElementById('wifi-qr-modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeWifiQR() {
  document.getElementById('wifi-qr-modal').classList.add('hidden');
  document.body.style.overflow = '';
}

function closeWifiQRBg(e) {
  if (e.target === document.getElementById('wifi-qr-modal')) closeWifiQR();
}

/* ═══════════════════════════════════════════════════════
   MARKDOWN RENDERER (simples, seguro)
   ═══════════════════════════════════════════════════════ */
function renderMarkdown(text) {
  const escaped = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const lines = escaped.split('\n');
  let html = '', inList = false;
  for (const line of lines) {
    const t = line.trim();
    if (t.startsWith('- ') || t.startsWith('• ')) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${t.slice(2).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      if (t) html += `<p>${t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

/* ═══════════════════════════════════════════════════════
   EVENT LISTENERS
   ═══════════════════════════════════════════════════════ */
function attachLangListeners() {
  document.querySelectorAll('[data-lang]').forEach(btn => {
    btn.addEventListener('click', () => {
      const params = new URLSearchParams(window.location.search);
      const unitId = params.get('unit');
      currentLang = btn.dataset.lang;
      chatHistory = [];
      if (unitId) localStorage.setItem('lf_lang_' + unitId, currentLang);
      render();
    });
  });
}

function attachTabListeners(t) {
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      btn.classList.add('active');
      const content = document.getElementById('tab-' + activeTab);
      if (content) content.classList.add('active');
      if (activeTab === 'chat') {
        renderChatMessages(t);
        setTimeout(() => scrollChat(), 50);
      }
    });
  });
}

function attachAccordionListeners() {
  document.querySelectorAll('[data-acc]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.acc;
      const item = document.getElementById('acc-' + id);
      const isOpen = item.classList.contains('open');
      document.querySelectorAll('.acc-item.open').forEach(el => {
        el.classList.remove('open');
        el.querySelector('.acc-header').setAttribute('aria-expanded', 'false');
      });
      if (!isOpen) {
        item.classList.add('open');
        btn.setAttribute('aria-expanded', 'true');
        activeAccordion = id;
      } else {
        activeAccordion = null;
      }
    });
  });
}

/* ═══════════════════════════════════════════════════════
   INTERAÇÕES
   ═══════════════════════════════════════════════════════ */
function copyWifi() {
  const t = i18n[currentLang];
  const btn = document.getElementById('copy-wifi-btn');
  if (!btn) return;
  navigator.clipboard.writeText(currentUnit.wifi.password).then(() => {
    btn.textContent = t.wifi_copied; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t.wifi_copy; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = currentUnit.wifi.password; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = t.wifi_copied; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t.wifi_copy; btn.classList.remove('copied'); }, 2000);
  });
}

/* ═══════════════════════════════════════════════════════
   CHAT IA
   ═══════════════════════════════════════════════════════ */
function renderChatMessages(t) {
  const container = document.getElementById('chat-messages');
  if (!container) return;
  container.innerHTML = '';
  if (chatHistory.length === 0) {
    addChatBubble(container, 'bot', t.chat_welcome.replace('{unit}', currentUnit.name), false);
  }
  chatHistory.forEach(msg => {
    addChatBubble(container, msg.role === 'user' ? 'user' : 'bot', msg.content, msg.role !== 'user');
  });
  scrollChat();
}

function addChatBubble(container, type, text, useMarkdown) {
  const div = document.createElement('div');
  div.className = `chat-msg ${type}`;
  if (useMarkdown && type === 'bot') {
    div.innerHTML = renderMarkdown(text);
  } else {
    div.textContent = text;
  }
  container.appendChild(div);
}

function scrollChat() {
  const c = document.getElementById('chat-messages');
  if (c) c.scrollTop = c.scrollHeight;
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  const t = i18n[currentLang];
  const container = document.getElementById('chat-messages');
  input.value = ''; input.style.height = 'auto';

  addChatBubble(container, 'user', text, false);
  chatHistory.push({ role: 'user', content: text });
  scrollChat();

  const typing = document.createElement('div');
  typing.className = 'chat-typing';
  typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  container.appendChild(typing); scrollChat();

  if (WORKER_URL.includes('[SEU-WORKER]')) {
    setTimeout(() => {
      container.removeChild(typing);
      addChatBubble(container, 'bot', t.chat_worker_notice, false);
      chatHistory.push({ role: 'assistant', content: t.chat_worker_notice });
      scrollChat();
    }, 800);
    return;
  }

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        unit: currentUnit.name,
        lang: currentLang,
        knowledgeBase: currentUnit.knowledgeBase[currentLang],
        messages: chatHistory.map(m => ({ role: m.role, content: m.content }))
      })
    });
    const data = await response.json();
    container.removeChild(typing);
    const reply = data?.content?.[0]?.text || t.chat_error;
    addChatBubble(container, 'bot', reply, true);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch {
    container.removeChild(typing);
    addChatBubble(container, 'bot', t.chat_error, false);
    chatHistory.push({ role: 'assistant', content: t.chat_error });
  }
  scrollChat();
}

/* ═══════════════════════════════════════════════════════
   ADMIN
   ═══════════════════════════════════════════════════════ */
function renderAdminLoading() {
  document.getElementById('app').innerHTML = `
    <header class="header">
      <div class="logo">LF Services</div>
      <span class="admin-badge">ADMIN</span>
    </header>
    <div class="admin-loading">
      <div class="chat-typing">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <span>Carregando métricas...</span>
    </div>`;
}

async function fetchAdminStats(key) {
  try {
    const res = await fetch(WORKER_URL + '?action=stats&key=' + encodeURIComponent(key));
    const data = await res.json();
    if (!res.ok || data.error) {
      renderAdminError(data.error || 'Erro desconhecido.');
      return;
    }
    renderAdminUI(data);
  } catch {
    renderAdminError('Não foi possível conectar ao worker.<br>Verifique se o WORKER_URL está correto.');
  }
}

function renderAdminUI(data) {
  const maxQ    = data.topQuestions[0]?.count || 1;
  const maxUnit = Math.max(...Object.values(data.byUnit || {0:1}), 1);
  const maxLang = Math.max(...Object.values(data.byLang || {0:1}), 1);

  const bar = (label, count, max) => `
    <div class="admin-bar-row">
      <span class="admin-bar-label" title="${label}">${label}</span>
      <div class="admin-bar-track">
        <div class="admin-bar-fill" style="width:${Math.round(count/max*100)}%"></div>
      </div>
      <span class="admin-bar-count">${count}x</span>
    </div>`;

  const unitBars = Object.entries(data.byUnit || {})
    .sort(([,a],[,b]) => b-a)
    .map(([u, c]) => bar(u, c, maxUnit)).join('');

  const langMap = { pt: '🇧🇷 Português', en: '🇺🇸 English', es: '🇪🇸 Español' };
  const langBars = Object.entries(data.byLang || {})
    .sort(([,a],[,b]) => b-a)
    .map(([l, c]) => bar(langMap[l] || l, c, maxLang)).join('');

  const topQRows = data.topQuestions.slice(0, 10)
    .map((q, i) => bar(`${i+1}. ${q.question}`, q.count, maxQ)).join('');

  const recentItems = data.recent.slice(0, 25).map(r => {
    const d = new Date(r.ts);
    const dateStr = d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' })
      + ' ' + d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
    const safeQ = r.question.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const safeA = r.answer.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `
      <div class="admin-conv-item">
        <div class="admin-conv-meta">
          <span class="admin-conv-date">${dateStr}</span>
          <span class="admin-conv-unit">${r.unit}</span>
          <span class="admin-conv-lang">${r.lang.toUpperCase()}</span>
        </div>
        <div class="admin-conv-q">❓ ${safeQ}</div>
        <div class="admin-conv-a">${safeA}</div>
      </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <header class="header">
      <div class="logo">LF Services</div>
      <span class="admin-badge">ADMIN</span>
    </header>
    <div class="admin-wrap">

      <div class="admin-section">
        <div class="admin-section-title">Visão Geral</div>
        <div class="admin-stat-row">
          <div class="admin-stat-card">
            <div class="admin-stat-num">${data.total}</div>
            <div class="admin-stat-label">conversas no total</div>
          </div>
          <div class="admin-stat-card">
            <div class="admin-stat-num">${data.topQuestions.length}</div>
            <div class="admin-stat-label">perguntas distintas</div>
          </div>
        </div>
      </div>

      ${unitBars ? `
      <div class="admin-section">
        <div class="admin-section-title">Por Unidade</div>
        ${unitBars}
      </div>` : ''}

      ${langBars ? `
      <div class="admin-section">
        <div class="admin-section-title">Por Idioma</div>
        ${langBars}
      </div>` : ''}

      ${topQRows ? `
      <div class="admin-section">
        <div class="admin-section-title">🔥 Top Perguntas</div>
        ${topQRows}
      </div>` : ''}

      ${recentItems ? `
      <div class="admin-section">
        <div class="admin-section-title">📋 Últimas Conversas</div>
        ${recentItems}
      </div>` : ''}

      ${!data.total ? `
      <div class="admin-error" style="margin-top:32px;">
        Nenhuma conversa registrada ainda.<br>
        As métricas aparecem após os hóspedes usarem o chat.
      </div>` : ''}

    </div>`;
}

function renderAdminError(msg) {
  document.getElementById('app').innerHTML = `
    <header class="header">
      <div class="logo">LF Services</div>
      <span class="admin-badge">ADMIN</span>
    </header>
    <div class="admin-wrap">
      <div class="admin-error" style="margin-top:40px;">${msg}</div>
    </div>`;
}

document.addEventListener('input', e => {
  if (e.target.classList.contains('chat-input')) {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 100) + 'px';
  }
});

init();
