<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0D0D1A" />
  <title>LF Services — Guest Portal</title>
  <style>
    /* ── VARIÁVEIS ──────────────────────────────────────────── */
    :root {
      --bg:          #0D0D1A;
      --bg-card:     #16162A;
      --bg-card2:    #1E1E35;
      --gold:        #F0C040;
      --gold-dim:    #A07A1A;
      --purple:      #7C3AED;
      --purple-dim:  #4C1D95;
      --text:        #E8E8F0;
      --text-dim:    #8888A8;
      --border:      #2A2A45;
      --success:     #34D399;
      --danger:      #F87171;
      --radius:      14px;
      --radius-sm:   8px;
      --font:        system-ui, -apple-system, 'Segoe UI', sans-serif;
      --transition:  0.25s ease;
    }

    /* ── RESET ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

    /* ── WRAPPER ─────────────────────────────────────────────── */
    .app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.03em;
    }
    .lang-switcher {
      display: flex;
      gap: 4px;
    }
    .lang-btn {
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      transition: var(--transition);
    }
    .lang-btn.active {
      background: var(--gold);
      color: #0D0D1A;
    }

    /* ── HERO ───────────────────────────────────────────────── */
    .hero {
      padding: 28px 20px 24px;
      background: linear-gradient(160deg, #1A0A3A 0%, #0F0C28 50%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 80% 0%, rgba(124,58,237,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--purple);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .hero-name {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
    }
    .hero-location {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .hero-times {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }
    .hero-time-card {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(240,192,64,0.2);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      backdrop-filter: blur(4px);
    }
    .hero-time-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }
    .hero-time-value {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--gold);
      line-height: 1.2;
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    /* ── TABS ───────────────────────────────────────────────── */
    .tabs {
      display: flex;
      padding: 0 20px;
      gap: 4px;
      margin-top: 8px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 12px 8px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-dim);
      border-bottom: 2px solid transparent;
      transition: var(--transition);
      text-align: center;
    }
    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* ── TAB CONTENT ─────────────────────────────────────────── */
    .tab-content { display: none; flex: 1; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* ── ACCORDION ───────────────────────────────────────────── */
    .accordion {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .acc-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .acc-item.open {
      border-color: rgba(240,192,64,0.35);
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    }
    .acc-header {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      text-align: left;
      transition: background var(--transition);
    }
    .acc-header:active { background: var(--bg-card2); }
    .acc-icon {
      font-size: 1.25rem;
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(240,192,64,0.08);
      border-radius: 8px;
    }
    .acc-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }
    .acc-chevron {
      font-size: 0.75rem;
      color: var(--text-dim);
      transition: transform var(--transition);
      flex-shrink: 0;
    }
    .acc-item.open .acc-chevron { transform: rotate(180deg); color: var(--gold); }
    .acc-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .acc-item.open .acc-body { max-height: 2000px; }
    .acc-inner {
      padding: 0 16px 16px;
      font-size: 0.9rem;
      color: var(--text-dim);
      line-height: 1.6;
    }

    /* ── WIFI ───────────────────────────────────────────────── */
    .wifi-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-card2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-top: 8px;
    }
    .wifi-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
    .wifi-value { font-size: 1rem; font-weight: 700; color: var(--text); margin-top: 2px; }
    .copy-btn {
      background: var(--gold);
      color: #0D0D1A;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      min-width: 80px;
      text-align: center;
      transition: opacity var(--transition);
    }
    .copy-btn:active { opacity: 0.7; }
    .copy-btn.copied {
      background: var(--success);
    }

    /* ── ACTION BUTTONS ──────────────────────────────────────── */
    .action-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .action-btn {
      flex: 1;
      min-width: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity var(--transition);
      min-height: 44px;
    }
    .action-btn:active { opacity: 0.7; }
    .btn-maps { background: var(--purple); color: #fff; }
    .btn-call { background: var(--success); color: #0D0D1A; }
    .btn-whatsapp { background: #25D366; color: #fff; }

    /* ── INFO ROWS ───────────────────────────────────────────── */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }
    .info-val {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      text-align: right;
    }

    /* ── LOCK CODE ───────────────────────────────────────────── */
    .lockcode-box {
      background: var(--bg-card2);
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius-sm);
      padding: 14px;
      margin-top: 10px;
    }
    .lockcode-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }
    .lockcode-value {
      font-size: 2rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 0.3em;
      margin-top: 4px;
    }

    /* ── RULES LIST ──────────────────────────────────────────── */
    .rules-list {
      list-style: none;
      margin-top: 8px;
    }
    .rules-list li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.4;
    }
    .rules-list li:last-child { border-bottom: none; }
    .rule-icon { flex-shrink: 0; margin-top: 1px; }

    /* ── CHECKLIST (check-in / check-out steps) ──────────────── */
    .checklist {
      list-style: none;
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--bg-card2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
    }
    .checklist-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }
    .checklist-text { font-size: 0.9rem; color: var(--text); line-height: 1.4; }
    .checklist-sub { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }

    /* ── PHOTO GRID ──────────────────────────────────────────── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .photo-item {
      aspect-ratio: 4/3;
      border-radius: var(--radius-sm);
      background: var(--bg-card2);
      overflow: hidden;
      position: relative;
    }
    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--text-dim);
      font-size: 0.7rem;
      text-align: center;
      padding: 8px;
    }
    .photo-placeholder-icon { font-size: 1.5rem; }

    /* ── EMERGENCY CONTACTS ──────────────────────────────────── */
    .contact-card {
      background: var(--bg-card2);
      border-radius: var(--radius-sm);
      padding: 14px;
      margin-top: 8px;
    }
    .contact-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .contact-role {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ── RECOMMENDATIONS ─────────────────────────────────────── */
    .rec-card {
      background: var(--bg-card2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-top: 8px;
    }
    .rec-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .rec-name { font-weight: 700; color: var(--text); }
    .rec-type {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--purple);
      background: rgba(124, 58, 237, 0.15);
      padding: 3px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .rec-tip { font-size: 0.85rem; color: var(--text-dim); margin-top: 6px; }

    /* ── CHAT ────────────────────────────────────────────────── */
    #tab-chat {
      flex: 1;
      display: none;
      flex-direction: column;
      height: calc(100vh - 230px);
    }
    #tab-chat.active { display: flex; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .chat-msg.bot {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .chat-msg.user {
      background: var(--purple);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .chat-typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    .chat-input-wrap {
      padding: 12px 16px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .chat-input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 16px;
      color: var(--text);
      font: inherit;
      font-size: 0.9rem;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
    }
    .chat-input::placeholder { color: var(--text-dim); }
    .chat-input:focus { border-color: var(--purple); }
    .chat-send {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--gold);
      color: #0D0D1A;
      font-size: 1.1rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity var(--transition);
    }
    .chat-send:active { opacity: 0.7; }
    .chat-notice {
      font-size: 0.72rem;
      color: var(--text-dim);
      text-align: center;
      padding: 4px 20px 0;
    }

    /* ── WORKER NOTICE (para desenvolvimento) ────────────────── */
    .worker-notice {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      margin: 8px 20px 0;
      font-size: 0.75rem;
      color: var(--danger);
      text-align: center;
    }

    /* ── FALLBACK ────────────────────────────────────────────── */
    .fallback {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      text-align: center;
      gap: 16px;
    }
    .fallback-icon { font-size: 3rem; }
    .fallback-title { font-size: 1.3rem; font-weight: 800; color: var(--text); }
    .fallback-text { font-size: 0.9rem; color: var(--text-dim); line-height: 1.6; }

    /* ── SCROLLBAR ───────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>

let currentLang = 'pt';
let currentUnit = null;
let chatHistory = []; // { role: 'user'|'assistant', content: string }
let activeAccordion = null;
let activeTab = 'info';

/* ═══════════════════════════════════════════════════════════════
   INICIALIZAÇÃO
   ═══════════════════════════════════════════════════════════════ */
function init() {
  const params = new URLSearchParams(window.location.search);
  const unitId = params.get('unit');
  currentUnit = unitId ? UNITS[Number(unitId)] : null;
  render();
}

/* ═══════════════════════════════════════════════════════════════
   RENDER PRINCIPAL
   ═══════════════════════════════════════════════════════════════ */
function render() {
  const app = document.getElementById('app');
  const t = i18n[currentLang];

  if (!currentUnit) {
    app.innerHTML = renderFallback(t);
    return;
  }

  app.innerHTML = `
    ${renderHeader(t)}
    ${renderHero(t)}
    ${renderTabs(t)}
    <div class="tab-content ${activeTab === 'info' ? 'active' : ''}" id="tab-info">
      <div class="accordion">
        ${renderWifi(t)}
        ${renderCheckin(t)}
        ${renderCheckinSteps(t)}
        ${renderCheckoutSteps(t)}
        ${renderParking(t)}
        ${renderRules(t)}
        ${renderAppliances(t)}
        ${renderPool(t)}
        ${currentUnit.gym ? renderGym(t) : ''}
        ${currentUnit.laundry ? renderLaundry(t) : ''}
        ${currentUnit.transfer ? renderTransfer(t) : ''}
        ${currentUnit.condoMap ? renderCondoMap(t) : ''}
        ${renderTrash(t)}
        ${renderRecommendations(t)}
        ${renderEmergency(t)}
      </div>
    </div>
    <div class="tab-content ${activeTab === 'chat' ? 'active' : ''}" id="tab-chat">
      ${WORKER_URL.includes('[SEU-WORKER]') ? `<div class="worker-notice">${t.chat_worker_notice}</div>` : ''}
      <div class="chat-messages" id="chat-messages"></div>
      <p class="chat-notice">${t.chat_notice}</p>
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chat-input" rows="1"
          placeholder="${t.chat_placeholder}"
          onkeydown="handleChatKey(event)"></textarea>
        <button class="chat-send" onclick="sendMessage()" aria-label="Enviar">➤</button>
      </div>
    </div>
  `;

  attachAccordionListeners();
  attachTabListeners(t);
  attachLangListeners();

  if (activeTab === 'chat') {
    renderChatMessages(t);
  }
}

/* ═══════════════════════════════════════════════════════════════

   ═══════════════════════════════════════════════════════════════ */
function renderHeader(t) {
  return `
    <header class="header">
      <div class="logo">LF Services</div>
      <div class="lang-switcher">
        ${['pt','en','es'].map(l => `
          <button class="lang-btn ${currentLang === l ? 'active' : ''}" data-lang="${l}">
            ${l.toUpperCase()}
          </button>
        `).join('')}
      </div>
    </header>
  `;
}

function renderHero(t) {
  const u = currentUnit;
  return `
    <div class="hero">
      <div class="hero-label">${t.unit_label}</div>
      <div class="hero-name">${u.name}</div>
      <div class="hero-location">📍 ${u.location}</div>
      <div class="hero-times">
        <div class="hero-time-card">
          <div class="hero-time-label">${t.checkin_label}</div>
          <div class="hero-time-value">${u.checkin.checkInTime}</div>
        </div>
        <div class="hero-time-card">
          <div class="hero-time-label">${t.checkout_label}</div>
          <div class="hero-time-value">${u.checkin.checkOutTime}</div>
        </div>
      </div>
    </div>
  `;
}

function renderTabs(t) {
  return `
    <div class="tabs">
      <button class="tab-btn ${activeTab === 'info' ? 'active' : ''}" data-tab="info">
        ${t.tab_info}
      </button>
      <button class="tab-btn ${activeTab === 'chat' ? 'active' : ''}" data-tab="chat">
        ✨ ${t.tab_chat}
      </button>
    </div>
  `;
}

function accItem(id, icon, title, content) {
  return `
    <div class="acc-item" id="acc-${id}">
      <button class="acc-header" data-acc="${id}" aria-expanded="false">
        <span class="acc-icon">${icon}</span>
        <span class="acc-title">${title}</span>
        <span class="acc-chevron">▼</span>
      </button>
      <div class="acc-body">
        <div class="acc-inner">${content}</div>
      </div>
    </div>
  `;
}

function renderWifi(t) {
  const u = currentUnit;
  return accItem('wifi', '📶', t.wifi_title, `

/* ═══════════════════════════════════════════════════════════════
   EVENT LISTENERS
   ═══════════════════════════════════════════════════════════════ */
function attachLangListeners() {
  document.querySelectorAll('[data-lang]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentLang = btn.dataset.lang;
      chatHistory = []; // reset chat ao trocar idioma
      render();
    });
  });
}

function attachTabListeners(t) {
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      btn.classList.add('active');
      const content = document.getElementById('tab-' + activeTab);
      if (content) content.classList.add('active');
      if (activeTab === 'chat') {
        renderChatMessages(t);
        setTimeout(() => scrollChat(), 50);
      }
    });
  });
}

function attachAccordionListeners() {
  document.querySelectorAll('[data-acc]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.acc;
      const item = document.getElementById('acc-' + id);
      const isOpen = item.classList.contains('open');

      // Fechar todos
      document.querySelectorAll('.acc-item.open').forEach(el => {
        el.classList.remove('open');
        el.querySelector('.acc-header').setAttribute('aria-expanded', 'false');
      });

      // Abrir o clicado (se estava fechado)
      if (!isOpen) {
        item.classList.add('open');
        btn.setAttribute('aria-expanded', 'true');
        activeAccordion = id;
      } else {
        activeAccordion = null;
      }
    });
  });
}

/* ═══════════════════════════════════════════════════════════════
   INTERAÇÕES
   ═══════════════════════════════════════════════════════════════ */
function copyWifi() {
  const t = i18n[currentLang];
  const btn = document.getElementById('copy-wifi-btn');
  if (!btn) return;

  navigator.clipboard.writeText(currentUnit.wifi.password).then(() => {
    btn.textContent = t.wifi_copied;
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = t.wifi_copy;
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // Fallback para navegadores sem clipboard API
    const ta = document.createElement('textarea');
    ta.value = currentUnit.wifi.password;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = t.wifi_copied;
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = t.wifi_copy;
      btn.classList.remove('copied');
    }, 2000);
  });
}

/* ═══════════════════════════════════════════════════════════════
   CHAT IA
   ═══════════════════════════════════════════════════════════════ */
function renderChatMessages(t) {
  const container = document.getElementById('chat-messages');
  if (!container) return;

  container.innerHTML = '';

  // Mensagem de boas-vindas
  if (chatHistory.length === 0) {
    const welcome = t.chat_welcome.replace('{unit}', currentUnit.name);
    addChatBubble(container, 'bot', welcome);
  }

  // Histórico
  chatHistory.forEach(msg => {
    addChatBubble(container, msg.role === 'user' ? 'user' : 'bot', msg.content);
  });

  scrollChat();
}

function addChatBubble(container, type, text) {
  const div = document.createElement('div');
  div.className = `chat-msg ${type}`;
  div.textContent = text;
  container.appendChild(div);
}

function scrollChat() {
  const container = document.getElementById('chat-messages');
  if (container) container.scrollTop = container.scrollHeight;
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  const t = i18n[currentLang];
  const container = document.getElementById('chat-messages');
  input.value = '';
  input.style.height = 'auto';

  // Mostrar mensagem do usuário
  addChatBubble(container, 'user', text);
  chatHistory.push({ role: 'user', content: text });
  scrollChat();

  // Mostrar typing indicator
  const typing = document.createElement('div');
  typing.className = 'chat-typing';
  typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  container.appendChild(typing);
  scrollChat();

  // Verificar se Worker está configurado
  if (WORKER_URL.includes('[SEU-WORKER]')) {
    setTimeout(() => {
      container.removeChild(typing);
      const errorMsg = t.chat_worker_notice;
      addChatBubble(container, 'bot', errorMsg);
      chatHistory.push({ role: 'assistant', content: errorMsg });
      scrollChat();
    }, 800);
    return;
  }

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        unit: currentUnit.name,
        lang: currentLang,
        knowledgeBase: currentUnit.knowledgeBase[currentLang],
        messages: chatHistory.map(m => ({ role: m.role, content: m.content }))
      })
    });

    const data = await response.json();
    container.removeChild(typing);

    const reply = data?.content?.[0]?.text || t.chat_error;
    addChatBubble(container, 'bot', reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch {
    container.removeChild(typing);
    addChatBubble(container, 'bot', t.chat_error);
    chatHistory.push({ role: 'assistant', content: t.chat_error });
  }

  scrollChat();
}
